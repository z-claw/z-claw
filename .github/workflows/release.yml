# 参考: https://tauri.app/distribute/pipelines/github/#example-workflow
# 仅在推送符合 SemVer 的 git tag（v*）时构建并发布到 GitHub Release。
# 推送示例: git tag v0.1.0 && git push origin v0.1.0
#
# 若出现 “Resource not accessible by integration”，请在仓库 Settings → Actions → General
# → Workflow permissions 中开启 “Read and write permissions”。

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rust_targets: aarch64-apple-darwin
          # macOS Intel
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
            rust_targets: x86_64-apple-darwin
          # Linux x64 — 产出 .deb / .rpm / .AppImage，适用于多数常见桌面发行版
          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
          # Linux ARM64（公开仓库可用；与官方文档一致）
          - platform: ubuntu-22.04-arm
            args: ""
            rust_targets: ""
          # Windows x64
          - platform: windows-latest
            args: ""
            rust_targets: ""
          # Windows ARM64（在 x64 runner 上交叉编译）
          - platform: windows-latest
            args: "--target aarch64-pc-windows-msvc"
            rust_targets: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Ubuntu)
        if: contains(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable (extra targets)
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Rust stable
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          sharedKey: release-${{ matrix.platform }}-${{ matrix.rust_targets }}

      - name: Install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "z-claw v__VERSION__"
          releaseBody: "见下方 Assets 下载各平台安装包（Windows x64 / ARM64、Linux x64 / ARM64、macOS Intel / Apple Silicon）。"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
