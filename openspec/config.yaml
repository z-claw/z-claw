schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts. Cross-check with repo README.md.
context: |
  Repository: z-claw — pnpm workspaces monorepo (Node >= 20, package manager pnpm 9).
  Top-level layout: apps/desktop (Tauri shell + React UI), crates/z-claw-kernel (Rust kernel),
  packages/ui (shared components), src-tauri (Tauri bridge), openspec/ (specs + this file).

  Desktop: apps/desktop — Tauri 2, Vite, React 19, TypeScript; import UI as @workspace/ui (workspace:*).
  Bridge: src-tauri invokes kernel_send(UiCommand); kernel emits KernelEvent over the "kernel-event" channel.
  Kernel protocol: crates/z-claw-kernel/src/protocol.rs — extend UiCommand/KernelEvent in tandem with desktop types.

  Agent workspace: per-agent folders under the data-dir workspace (DefaultAgent/IDENTITY.md, MEMORY.md);
  UI flows include ListAgents, SetActiveAgent, LoadAgentProfile, SaveAgentProfile, Delegate.

  Tooling: ESLint + Prettier (Tailwind); from repo root use pnpm -r for lint/typecheck; Rust: cargo test -p z-claw-kernel.
  Git: feature branches from main; PRs should pass lint/typecheck and keep OpenSpec artifacts consistent with code.

  OpenSpec skill files are duplicated under .claude/skills, .cursor/skills, .codex/skills, .agent/skills,
  .opencode/skills, and .trae/skills; treat .claude/skills/openspec-* as the canonical copy when updating workflows.
  Human overview: see README.md in the repository root.

# Per-artifact rules (optional)
rules:
  proposal:
    - Include a clear problem statement and scope; add a Non-goals section when scope could be misread.
    - Prefer under 800 words unless the change is genuinely large.
  tasks:
    - Each task should be a single verifiable step; group related work; aim for chunks that fit one focused session.
  design:
    - Name affected apps/packages and key files or modules when known; call out bridge/kernel boundaries for UI work.
